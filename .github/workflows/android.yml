# Android CI — assemble all flavours + test
#
# MANUAL TRIGGER ONLY. To activate on push/PR, see docs/setup/GITHUB_ACTIONS.md.
#
on:
  workflow_dispatch:

name: android

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/starter-android

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('apps/starter-android/**/*.gradle.kts', 'apps/starter-android/gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Assemble dev debug
        run: ./gradlew assembleDevDebug

      - name: Assemble staging debug
        run: ./gradlew assembleStagingDebug

      - name: Assemble prod release
        run: ./gradlew assembleProdRelease

      - name: Run unit tests
        run: ./gradlew test
