# Onlystack / StarterApp — Local development stack
# Usage: docker-compose up -d
# Stop:  docker-compose down
# Reset: docker-compose down -v  (deletes all data)

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: starterapp_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Optional: Meilisearch for full-text search
  # Uncomment when you add search functionality
  # meilisearch:
  #   image: getmeili/meilisearch:v1.7
  #   environment:
  #     MEILI_MASTER_KEY: masterKey
  #     MEILI_ENV: development
  #   ports:
  #     - "7700:7700"
  #   volumes:
  #     - meilisearch_data:/meili_data

volumes:
  postgres_data:
  redis_data:
  # meilisearch_data:
