# Deploy backend to Railway
# Manual trigger with environment selection.
# Prerequisite: Add RAILWAY_TOKEN secret (Settings → Tokens in Railway dashboard).

name: deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      run_migrations:
        description: 'Run database migrations after deploy'
        required: true
        default: true
        type: boolean

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/starter-api/package-lock.json

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        working-directory: apps/starter-api
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up --environment ${{ github.event.inputs.environment }} --detach
          echo "Deployment triggered for environment: ${{ github.event.inputs.environment }}"

      - name: Run migrations
        if: ${{ github.event.inputs.run_migrations == 'true' }}
        working-directory: apps/starter-api
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway run --environment ${{ github.event.inputs.environment }} \
            -- npx prisma migrate deploy
          echo "Migrations complete"
