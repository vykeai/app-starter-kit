sentinel: "1.0"
project: starter-app

# Sentinel is the source of truth for cross-platform consistency.
# Install the Sentinel CLI: npm install (links sentinel from your local checkout).
# Run before every task: npm run schema:validate
# Run after schema edits: npm run schema:generate
#
# When schema:generate runs, it writes the output files below.
# Never hand-edit those files — edit schemas then regenerate.

platforms:
  ios:
    path: ./ios
    language: swift
    output:
      tokens:    ./ios/AppStarterKit/DesignSystem/Tokens/AppTokens.swift
      strings:   ./ios/AppStarterKit/Resources/Strings.swift
      flags:     ./ios/AppStarterKit/Core/FeatureFlags.swift
      models:    ./ios/AppStarterKit/Core/Models/Models.swift
      endpoints: ./ios/AppStarterKit/Core/Network/APIClientProtocol.swift

  android:
    path: ./android
    language: kotlin
    output:
      tokens:    ./android/app/src/main/kotlin/com/appstarterkit/app/design/tokens/AppTokens.kt
      strings:   ./android/app/src/main/res/values/strings-generated.xml
      flags:     ./android/app/src/main/kotlin/com/appstarterkit/app/core/FeatureFlags.kt
      models:    ./android/app/src/main/kotlin/com/appstarterkit/app/core/models/Models.kt
      endpoints: ./android/app/src/main/kotlin/com/appstarterkit/app/core/network/APIClient.kt

catalog:
  output: catalog/
  resize: 1000
  ios18:
    slug: starter-ios           # update to match your simemu slug when using this template
    app_id: starter.app.dev     # update to match your bundle ID
  ios26:
    slug: starter-ios26
    app_id: starter.app.dev
    glossy: true
  android:
    slug: starter-android
    app_id: com.appstarterkit.app  # update to match your Android package
  screens: []  # add screens as you build them — slug + flow path required
