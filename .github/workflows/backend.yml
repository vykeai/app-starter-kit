# Backend CI — NestJS lint + typecheck + test
#
# MANUAL TRIGGER ONLY. To activate on push/PR, see docs/setup/GITHUB_ACTIONS.md.
#
on:
  workflow_dispatch:

name: backend

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/starter-api

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: app_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/app_test
      JWT_SECRET: ci-test-secret
      REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/starter-api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: E2E tests
        run: npm run test:e2e

      - name: Validate fixtures
        working-directory: ${{ github.workspace }}
        run: node scripts/validate-fixtures.js
